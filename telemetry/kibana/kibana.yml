# Kibana Configuration — PS13 Telemetry Dashboard

server.host: "0.0.0.0"
server.port: 5601

elasticsearch.hosts: ["http://elasticsearch:9200"]

# For air-gapped deployment — no telemetry to Elastic
telemetry.enabled: false
telemetry.optIn: false

# Default app on startup
uiSettings:
  overrides:
    "defaultRoute": "/app/dashboards"

# Logging
logging.root.level: info
