# PS13 Telemetry Stack — Docker Compose
# Runs alongside the Containerlab FRR topology.
# All services connect to ps13-mgmt network to reach FRR containers.
#
# Usage:
#   docker compose -f telemetry/docker-compose.yml up -d
#   docker compose -f telemetry/docker-compose.yml down

version: "3.8"

networks:
  ps13-mgmt:
    external: true
    name: clab-ps13-ps13-mgmt

services:

  # ── Telegraf ──────────────────────────────────────────
  telegraf:
    image: telegraf:latest
    container_name: ps13-telegraf
    hostname: telegraf
    networks:
      - ps13-mgmt
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9273:9273"
    depends_on:
      - kafka
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ps13-prometheus
    hostname: prometheus
    networks:
      - ps13-mgmt
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    restart: unless-stopped

  # ── Kafka ─────────────────────────────────────────────
  kafka:
    image: bitnami/kafka:latest
    container_name: ps13-kafka
    hostname: kafka
    networks:
      - ps13-mgmt
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_LOG_RETENTION_MS=604800000
      - KAFKA_CFG_NUM_PARTITIONS=3
      - KAFKA_KRAFT_CLUSTER_ID=ps13-telemetry-kafka
    volumes:
      - kafka_data:/bitnami/kafka
    restart: unless-stopped

  # ── Elasticsearch ─────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: ps13-elasticsearch
    hostname: elasticsearch
    networks:
      - ps13-mgmt
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=ps13-telemetry
    volumes:
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - es_data:/usr/share/elasticsearch/data
    mem_limit: 1g
    restart: unless-stopped

  # ── Kibana ────────────────────────────────────────────
  kibana:
    image: kibana:8.12.0
    container_name: ps13-kibana
    hostname: kibana
    networks:
      - ps13-mgmt
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - TELEMETRY_ENABLED=false
    volumes:
      - ./kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    depends_on:
      - elasticsearch
    mem_limit: 512m
    restart: unless-stopped

  # ── Filebeat ──────────────────────────────────────────
  filebeat:
    image: elastic/filebeat:8.12.0
    container_name: ps13-filebeat
    hostname: filebeat
    networks:
      - ps13-mgmt
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - elasticsearch
    user: root
    restart: unless-stopped

  # ── Kafka UI (optional — for debugging) ───────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ps13-kafka-ui
    hostname: kafka-ui
    networks:
      - ps13-mgmt
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=ps13-telemetry
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka
    profiles:
      - debug
    restart: unless-stopped

volumes:
  prometheus_data:
  kafka_data:
  es_data:
