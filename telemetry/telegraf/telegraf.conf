###############################################################################
# Telegraf Configuration — PS13 Network Telemetry Pipeline
# Runs as a Docker container on ps13-mgmt network, collects stats from
# all 10 FRR router containers via exec/vtysh and interface polling.
###############################################################################

[agent]
  interval = "10s"
  flush_interval = "10s"
  omit_hostname = false

###############################################################################
# INPUT PLUGINS
###############################################################################

# ── BGP Summary ──────────────────────────────────────────────────────────
[[inputs.exec]]
  commands = [
    "docker exec clab-ps13-ce1-blr vtysh -c 'show bgp summary json' 2>/dev/null",
    "docker exec clab-ps13-pe1-blr vtysh -c 'show bgp summary json' 2>/dev/null",
    "docker exec clab-ps13-p1 vtysh -c 'show bgp summary json' 2>/dev/null",
    "docker exec clab-ps13-ce1-mum vtysh -c 'show bgp summary json' 2>/dev/null",
    "docker exec clab-ps13-pe1-mum vtysh -c 'show bgp summary json' 2>/dev/null",
    "docker exec clab-ps13-p2 vtysh -c 'show bgp summary json' 2>/dev/null",
    "docker exec clab-ps13-ce1-che vtysh -c 'show bgp summary json' 2>/dev/null",
    "docker exec clab-ps13-pe1-che vtysh -c 'show bgp summary json' 2>/dev/null",
    "docker exec clab-ps13-ce1-del vtysh -c 'show bgp summary json' 2>/dev/null",
    "docker exec clab-ps13-pe1-del vtysh -c 'show bgp summary json' 2>/dev/null",
  ]
  timeout = "5s"
  data_format = "json"
  name_override = "bgp_summary"
  tag_with = "source"
  [inputs.exec.tags]
    collector = "telegraf"

# ── OSPF Neighbor Summary ───────────────────────────────────────────────
[[inputs.exec]]
  commands = [
    "docker exec clab-ps13-pe1-blr vtysh -c 'show ip ospf neighbor json' 2>/dev/null",
    "docker exec clab-ps13-p1 vtysh -c 'show ip ospf neighbor json' 2>/dev/null",
    "docker exec clab-ps13-pe1-mum vtysh -c 'show ip ospf neighbor json' 2>/dev/null",
    "docker exec clab-ps13-p2 vtysh -c 'show ip ospf neighbor json' 2>/dev/null",
    "docker exec clab-ps13-pe1-che vtysh -c 'show ip ospf neighbor json' 2>/dev/null",
    "docker exec clab-ps13-pe1-del vtysh -c 'show ip ospf neighbor json' 2>/dev/null",
  ]
  timeout = "5s"
  data_format = "json"
  name_override = "ospf_neighbors"
  [inputs.exec.tags]
    collector = "telegraf"

# ── Interface Counters (via /proc/net/dev) ───────────────────────────────
[[inputs.exec]]
  commands = [
    "docker exec clab-ps13-ce1-blr cat /proc/net/dev 2>/dev/null",
    "docker exec clab-ps13-pe1-blr cat /proc/net/dev 2>/dev/null",
    "docker exec clab-ps13-p1 cat /proc/net/dev 2>/dev/null",
    "docker exec clab-ps13-ce1-mum cat /proc/net/dev 2>/dev/null",
    "docker exec clab-ps13-pe1-mum cat /proc/net/dev 2>/dev/null",
    "docker exec clab-ps13-p2 cat /proc/net/dev 2>/dev/null",
    "docker exec clab-ps13-ce1-che cat /proc/net/dev 2>/dev/null",
    "docker exec clab-ps13-pe1-che cat /proc/net/dev 2>/dev/null",
    "docker exec clab-ps13-ce1-del cat /proc/net/dev 2>/dev/null",
    "docker exec clab-ps13-pe1-del cat /proc/net/dev 2>/dev/null",
  ]
  timeout = "5s"
  data_format = "value"
  name_override = "interface_counters"
  data_type = "string"
  [inputs.exec.tags]
    collector = "telegraf"

# ── MPLS LDP Neighbor ───────────────────────────────────────────────────
[[inputs.exec]]
  commands = [
    "docker exec clab-ps13-p1 vtysh -c 'show mpls ldp neighbor json' 2>/dev/null",
    "docker exec clab-ps13-p2 vtysh -c 'show mpls ldp neighbor json' 2>/dev/null",
    "docker exec clab-ps13-pe1-blr vtysh -c 'show mpls ldp neighbor json' 2>/dev/null",
    "docker exec clab-ps13-pe1-mum vtysh -c 'show mpls ldp neighbor json' 2>/dev/null",
    "docker exec clab-ps13-pe1-che vtysh -c 'show mpls ldp neighbor json' 2>/dev/null",
    "docker exec clab-ps13-pe1-del vtysh -c 'show mpls ldp neighbor json' 2>/dev/null",
  ]
  timeout = "5s"
  data_format = "json"
  name_override = "ldp_neighbors"
  [inputs.exec.tags]
    collector = "telegraf"

# ── IP Route Table Summary ──────────────────────────────────────────────
[[inputs.exec]]
  commands = [
    "docker exec clab-ps13-ce1-blr vtysh -c 'show ip route summary json' 2>/dev/null",
    "docker exec clab-ps13-pe1-blr vtysh -c 'show ip route summary json' 2>/dev/null",
    "docker exec clab-ps13-p1 vtysh -c 'show ip route summary json' 2>/dev/null",
    "docker exec clab-ps13-ce1-mum vtysh -c 'show ip route summary json' 2>/dev/null",
    "docker exec clab-ps13-pe1-mum vtysh -c 'show ip route summary json' 2>/dev/null",
    "docker exec clab-ps13-p2 vtysh -c 'show ip route summary json' 2>/dev/null",
    "docker exec clab-ps13-ce1-che vtysh -c 'show ip route summary json' 2>/dev/null",
    "docker exec clab-ps13-pe1-che vtysh -c 'show ip route summary json' 2>/dev/null",
    "docker exec clab-ps13-ce1-del vtysh -c 'show ip route summary json' 2>/dev/null",
    "docker exec clab-ps13-pe1-del vtysh -c 'show ip route summary json' 2>/dev/null",
  ]
  timeout = "5s"
  data_format = "json"
  name_override = "route_summary"
  [inputs.exec.tags]
    collector = "telegraf"

# ── Docker container health ──────────────────────────────────────────────
[[inputs.exec]]
  commands = [
    "docker ps --filter name=clab-ps13 --format '{{.Names}} {{.Status}}' 2>/dev/null",
  ]
  timeout = "5s"
  data_format = "value"
  name_override = "container_health"
  data_type = "string"
  [inputs.exec.tags]
    collector = "telegraf"

# ── CPU/Memory from each container ──────────────────────────────────────
[[inputs.exec]]
  commands = [
    "docker stats clab-ps13-ce1-blr clab-ps13-pe1-blr clab-ps13-p1 clab-ps13-ce1-mum clab-ps13-pe1-mum clab-ps13-p2 clab-ps13-ce1-che clab-ps13-pe1-che clab-ps13-ce1-del clab-ps13-pe1-del --no-stream --format '{{json .}}' 2>/dev/null",
  ]
  timeout = "10s"
  data_format = "json"
  name_override = "container_resources"
  [inputs.exec.tags]
    collector = "telegraf"

###############################################################################
# OUTPUT PLUGINS
###############################################################################

# ── Prometheus ────────────────────────────────────────────
[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2
  export_timestamp = true

# ── Kafka ─────────────────────────────────────────────────
[[outputs.kafka]]
  brokers = ["kafka:9092"]
  topic = "ps13-telemetry"
  data_format = "json"
  [outputs.kafka.sasl]
    username = ""
    password = ""

# ── InfluxDB line protocol to stdout (for debugging) ──────
[[outputs.file]]
  files = ["stdout"]
  data_format = "influx"
