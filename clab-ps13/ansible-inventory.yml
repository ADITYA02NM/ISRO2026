all:
  vars:
    # The generated inventory is assumed to be used from the clab host.
    # Hence no http proxy should be used. Therefore we make sure the http
    # module does not attempt using any global http proxy.
    ansible_httpapi_use_proxy: false
  children:
    linux:
      hosts:
        clab-ps13-ce1-blr:
          ansible_host: 172.20.0.10
        clab-ps13-ce1-che:
          ansible_host: 172.20.0.30
        clab-ps13-ce1-del:
          ansible_host: 172.20.0.40
        clab-ps13-ce1-mum:
          ansible_host: 172.20.0.20
        clab-ps13-p1:
          ansible_host: 172.20.0.12
        clab-ps13-p2:
          ansible_host: 172.20.0.22
        clab-ps13-pe1-blr:
          ansible_host: 172.20.0.11
        clab-ps13-pe1-che:
          ansible_host: 172.20.0.31
        clab-ps13-pe1-del:
          ansible_host: 172.20.0.41
        clab-ps13-pe1-mum:
          ansible_host: 172.20.0.21
        clab-ps13-trex:
          ansible_host: 172.20.0.100
